name: Validate GitHub Pages Export

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build:pages
        env:
          NEXT_PUBLIC_BASE_PATH: /tech-holler-pages
          NEXT_PUBLIC_SITE_URL: https://daniel5088.github.io/tech-holler-pages
      - uses: actions/upload-artifact@v4
        with:
          name: tech-holler-pages
          path: out
